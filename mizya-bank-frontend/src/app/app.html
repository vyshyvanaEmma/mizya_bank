<nav class="bg-black border-b border-orange-500 p-4 sticky top-0 z-50 overflow-hidden relative">
  <!-- animation -->
  <div class="absolute inset-0 pointer-events-none opacity-50">
    <div class="gd-player" style="animation-delay: 0s, 0s;"></div>
    <div class="gd-player" style="animation-delay: -4s, -4s;"></div>
    <div class="gd-player" style="animation-delay: -8s, -8s;"></div>
  </div>

  <div class="container mx-auto flex items-center justify-between gap-4 relative z-10">
    <!-- logo -->
    <div routerLink="/" class="flex items-center gap-3 cursor-pointer group shrink-0">
      <div
        class="relative w-10 h-10 flex items-center justify-center bg-orange-500 rounded-lg shadow-[0_0_15px_rgba(249,115,22,0.3)] group-hover:scale-110 transition-transform duration-300">
        <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="black" class="w-7 h-7">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 7l3 4h12l3-4M6 11v6a2 2 0 002 2h8a2 2 0 002-2v-6" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 14h.01M15 14h.01M12 17l1-1h-2l1 1z" />
        </svg>
      </div>
      <div class="text-orange-500 font-black text-2xl tracking-tighter uppercase">
        MIZYA<span class="text-white">BANK</span>
      </div>
    </div>

    <!-- hamburger Button -->
    <button (click)="toggleMenu()" class="text-orange-500 lg:hidden p-2 focus:outline-none ml-auto">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path *ngIf="!isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 6h16M4 12h16m-7 6h7"></path>
        <path *ngIf="isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>

    <!-- link for desktop -->
    <div class="hidden lg:flex gap-2 items-center">
      <ng-container *ngTemplateOutlet="navLinks"></ng-container>
    </div>
  </div>
</nav>

<!-- overlay -->
<div *ngIf="isMenuOpen" (click)="toggleMenu()" class="fixed inset-0 bg-black/60 z-30 lg:hidden"></div>

<!-- links -->
<ng-template #navLinks>
  <a (click)="isMenuOpen = false" routerLink="/saldo"
    routerLinkActive="active !bg-orange-500 !text-black font-bold shadow-lg" [routerLinkActiveOptions]="{exact: true}"
    class="flex items-center gap-2 text-gray-300 hover:bg-zinc-800 hover:text-orange-500 px-3 py-2 rounded-lg text-sm transition-all group shrink-0">
    <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
      class="w-5 h-5 transition-colors group-hover:text-orange-500 group-[.active]:text-black">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M21 12a2.25 2.25 0 0 0-2.25-2.25H15a3 3 0 1 1-6 0H5.25A2.25 2.25 0 0 0 3 12m18 0v6a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 18v-6m18 0V9M3 12V9m18 0a2.25 2.25 0 0 0-2.25-2.25H5.25A2.25 2.25 0 0 0 3 9m18 0V6a2.25 2.25 0 0 0-2.25-2.25H5.25A2.25 2.25 0 0 0 3 6v3" />
    </svg>
    Balance
  </a>

  <a (click)="isMenuOpen = false" routerLink="/deposito"
    routerLinkActive="active !bg-orange-500 !text-black font-bold shadow-lg"
    class="flex items-center gap-2 text-gray-300 hover:bg-zinc-800 hover:text-orange-500 px-3 py-2 rounded-lg text-sm transition-all group shrink-0">
    <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
      class="w-5 h-5 transition-colors group-hover:text-orange-500 group-[.active]:text-black">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
    </svg>
    Deposit
  </a>

  <a (click)="isMenuOpen = false" routerLink="/prelievo"
    routerLinkActive="active !bg-orange-500 !text-black font-bold shadow-lg"
    class="flex items-center gap-2 text-gray-300 hover:bg-zinc-800 hover:text-orange-500 px-3 py-2 rounded-lg text-sm transition-all group shrink-0">
    <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
      class="w-5 h-5 transition-colors group-hover:text-orange-500 group-[.active]:text-black">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
    </svg>
    Withdraw
  </a>

  <a (click)="isMenuOpen = false" routerLink="/movimenti"
    routerLinkActive="active !bg-orange-500 !text-black font-bold shadow-lg"
    class="flex items-center gap-2 text-gray-300 hover:bg-zinc-800 hover:text-orange-500 px-3 py-2 rounded-lg text-sm transition-all group shrink-0">
    <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
      class="w-5 h-5 transition-colors group-hover:text-orange-500 group-[.active]:text-black">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 17.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
    </svg>
    History
  </a>

  <a (click)="isMenuOpen = false" routerLink="/conversione-val"
    routerLinkActive="active !bg-orange-500 !text-black font-bold shadow-lg"
    class="flex items-center gap-2 text-gray-300 hover:bg-zinc-800 hover:text-orange-500 px-3 py-2 rounded-lg text-sm transition-all border border-orange-900/30 group shrink-0">
    <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
      class="w-5 h-5 transition-colors group-hover:text-orange-500 group-[.active]:text-black">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M12 6v12m-3-2.818.879.659c1.546 1.16 4.455 1.16 6.001 0m-6.001-4.363.879.659c1.546 1.16 4.455 1.16 6.001 0m-6.001-4.363.879.659c1.546 1.16 4.455 1.16 6.001 0M6.75 12h10.5" />
    </svg>
    Fiat
  </a>

  <a (click)="isMenuOpen = false" routerLink="/conversione-crypto"
    routerLinkActive="active !bg-orange-500 !text-black font-bold shadow-lg"
    class="flex items-center gap-2 text-gray-300 hover:bg-zinc-800 hover:text-orange-500 px-3 py-2 rounded-lg text-sm transition-all border border-orange-900/30 group shrink-0">
    <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
      class="w-5 h-5 transition-colors group-hover:text-orange-500 group-[.active]:text-black">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M9 9.75h4.5m-4.5 4.5h4.5M9 12h4.5m3.75-1.5a.75.75 0 0 1 .75.75v.75a.75.75 0 0 1-.75.75h-.75a.75.75 0 0 1-.75-.75v-.75a.75.75 0 0 1 .75-.75h.75Z" />
    </svg>
    Crypto
  </a>
</ng-template>

<div class="min-h-screen bg-zinc-900 text-white p-6">
  <div class="container mx-auto">
    <router-outlet></router-outlet>
  </div>
</div>
